<html>
	<head>
		<script>
			function error_log(msg) {
				var el = document.getElementById("error");
				el.innerHTML = msg;
			}

			async function sha256(challenge) {
				var solution = 0;

				// Starting time of the computation run
				var start = Date.now();
				console.log('Start time: ' + start);

				var reprat = true;
				while (true) {
					solution ++; 

					// Encode as UTF-8
					const msgBuffer = new TextEncoder().encode(challenge + solution);

					// Hash the message
					// NB: returns a promise, so we need to process it
					const arrayBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
					var hash = Array.from(new Uint8Array(arrayBuffer));
					if ((hash[0] == 0) && (hash[1] == 0)) {
						repeat = false;

						var duration = Date.now() - start;
						var hex = hash.map(b => b.toString(16).padStart(2, '0')).join('');
						var log = 'Challenge: ' + challenge + '\n';
						log += 'Duration: ' + duration/1000 + ' s\n';
						log += 'Performance: ' + parseInt(1000 * solution / duration) + ' hashes/s\n';
						log += 'Solution: ' + solution + '\n';
						log += 'Hash: ' + hex;
						console.log(log);

						return solution;
					}
					else
						// Run again with an incremented solution
						solution ++;
				}
			}

			function sobek() {
				// Get URL from location
				var locProto = document.location.protocol;
				var locHostname = document.location.hostname;
				var url = locProto + '//' + locHostname + '/sobek';
				console.log('Sobek URL: ' + url);

				// Get challenge
				var xhr = new XMLHttpRequest();
				xhr.onreadystatechange = function() {
					if ((this.readyState != 4) || (this.status != 200)) {
						console.log('Error getting challenge: ' + this.status);
						error_log('Error getting challenge: ' + this.status);
						return;
					}

					console.log(xhr.responseText);
					var data = JSON.parse(xhr.responseText);

					var solution = sha256(data.challenge);
					solution.then(function(result){
						console.log("Solution: " + result);

						// Submit solution together with the original challenge, timestamp and signature
						var xhr2 = new XMLHttpRequest();
						xhr2.onreadystatechange = function() {
							if ((this.readyState != 4) || (this.status != 200)) {
								console.log('Error sending solution: ' + this.status);
								error_log('Error sending solution: ' + this.status);
								return;
							}

							// Set cookie as returned by the backend
							document.cookie = xhr.responseText; 

							// Return to original URL - refresh the page
							window.location.reload(true);
						};
						xhr2.setRequestHeader('Content-type', 'application/x-www-form-urlencoded');
						xhr2.open("POST", url);
						var params = 'timestamp=' + data.timestamp + '&challenge=' + data.challenge + '&signature=' + data.signature + '&solution=' + solution;
						xhr2.send();
					});
				};
				xhr.open("GET", url);
				xhr.send();
			};
		</script>
	</head>
	<body onLoad=javascript:sobek();>
		<h3>Checking that you are not a bot...</h3>
		<h4 id=error style="color:red;"></h4>
	</body>
